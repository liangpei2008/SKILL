<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>业务原型</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark"></span>
        <span>业务原型</span>
      </div>
      <nav class="nav" aria-label="主导航">
        <button class="nav-item active" data-view="dashboard">工作台</button>
        <button class="nav-item" data-view="list">业务列表</button>
        <button class="nav-item" data-view="detail">业务详情</button>
        <button class="nav-item" data-view="approval">审批处理</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Prototype</p>
          <h1 id="view-title">工作台</h1>
        </div>
        <div class="role-switch">
          <label for="role">角色</label>
          <select id="role">
            <option>业务人员</option>
            <option>部门经理</option>
            <option>管理员</option>
          </select>
        </div>
      </header>

      <section id="dashboard" class="view active">
        <div class="metrics">
          <article><span>待处理</span><strong>12</strong></article>
          <article><span>进行中</span><strong>36</strong></article>
          <article><span>已完成</span><strong>128</strong></article>
        </div>
        <div class="panel">
          <h2>今日任务</h2>
          <div class="task-row">
            <span>确认核心业务单据</span>
            <button data-view="list">查看</button>
          </div>
          <div class="task-row">
            <span>处理待审批事项</span>
            <button data-view="approval">处理</button>
          </div>
        </div>
      </section>

      <section id="list" class="view">
        <div class="toolbar">
          <input type="search" placeholder="搜索编号、客户或负责人" />
          <button id="create-record">新增</button>
        </div>
        <div class="table">
          <button class="table-row" data-view="detail">
            <span>YW-2026-001</span><span>华东客户</span><span class="status pending">待审批</span>
          </button>
          <button class="table-row" data-view="detail">
            <span>YW-2026-002</span><span>华南客户</span><span class="status active">进行中</span>
          </button>
          <button class="table-row" data-view="detail">
            <span>YW-2026-003</span><span>西南客户</span><span class="status done">已完成</span>
          </button>
        </div>
      </section>

      <section id="detail" class="view">
        <div class="panel">
          <div class="detail-head">
            <div>
              <p class="eyebrow">YW-2026-001</p>
              <h2>华东客户业务单据</h2>
            </div>
            <span class="status pending">待审批</span>
          </div>
          <dl class="detail-grid">
            <div><dt>责任人</dt><dd>张敏</dd></div>
            <div><dt>所属部门</dt><dd>销售一部</dd></div>
            <div><dt>金额区间</dt><dd>50-100 万</dd></div>
            <div><dt>更新时间</dt><dd>2026-07-10</dd></div>
          </dl>
          <div class="actions">
            <button data-view="approval">提交审批</button>
            <button class="secondary" data-view="list">返回列表</button>
          </div>
        </div>
      </section>

      <section id="approval" class="view">
        <div class="panel">
          <h2>审批处理</h2>
          <p class="muted">请确认业务信息和审批意见，处理后状态将在原型中即时反馈。</p>
          <textarea placeholder="填写审批意见"></textarea>
          <div class="actions">
            <button id="approve">通过</button>
            <button id="reject" class="danger">驳回</button>
          </div>
          <p id="feedback" class="feedback" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
