version: "1.0.0"
domain: 原型生成

document:
  format: markdown
  encoding: utf-8
  required_sections:
    - 原型目标与范围
    - 用户角色与使用场景
    - 页面/模块清单
    - 页面流与业务流程
    - 页面详细说明
    - 角色权限与数据范围
    - 样例数据说明
    - 待确认问题清单
    - 原型交付说明

interaction:
  max_questions_per_batch: 6
  max_followup_rounds: 2
  stages:
    - name: 原型目标确认
      round: 0
      output: 总体范围确认
    - name: 用户与场景探索
      round: 1
      output: 用户目标和演示主线
    - name: 页面结构探索
      round: 2
      output: 页面清单与导航关系
    - name: 页面交互探索
      round: 3
      output: 页面内容、动作、状态和样例数据
    - name: 角色权限探索
      round: 4
      output: 角色权限与数据范围
    - name: 原型生成
      round: 5
      output: Markdown说明或HTML原型

prototype:
  default_output_dir: prototype-generation
  html_template: assets/html-prototype-template
  prefer_static_html: true
  include_mermaid: true
  profiles:
    management_backend:
      trigger_keywords:
        - 管理后台
        - 运营后台
        - 后台
        - 管理端
        - 内部系统
        - CRM
        - ERP
        - OA
        - 台账
        - 审批后台
        - 权限管理
        - 数据管理
      reference: references/admin-backend-ui-interaction.md
      default_first_screen: 工作台或业务列表
      required_patterns:
        - 左侧导航
        - 顶部全局操作区
        - 筛选区
        - 表格列表
        - 分页
        - 详情页或抽屉
        - 新增或编辑表单
        - 审批或处理反馈
        - 角色权限差异

completeness_checklist:
  目标与场景:
    - 是否明确原型用途和目标观众
    - 是否明确必须跑通的核心演示流程
    - 是否明确本期包含和排除的范围
  页面与流程:
    - 是否列出全部页面和模块
    - 是否每个核心流程都有Mermaid页面流或业务流
    - 是否每个页面都有入口、出口和跳转目标
  页面内容:
    - 是否每个页面都有展示信息、主要操作和状态反馈
    - 是否关键页面都有合理样例数据
    - 是否页面类型覆盖了业务需要
  角色与权限:
    - 是否列出全部角色
    - 是否明确每个角色可见页面和可操作动作
    - 是否每个列表或查询页面都明确不同角色的数据范围
  交付:
    - 是否列出待确认问题
    - 是否说明如何打开或预览原型
    - 若生成HTML，是否确认核心路径可以点击跑通
  管理后台:
    - 是否识别并套用了管理后台UI与交互规范
    - 是否列表页包含筛选、表格、分页、行内操作、批量操作和状态反馈
    - 是否表单页包含字段分组、校验、保存、提交、取消和错误反馈
    - 是否详情页包含状态、关联记录、操作日志或流转记录
    - 是否权限、审批、导入导出和危险操作均有明确交互规则
