version: "1.0.0"
domain: 原型生成

selectionPriority:
  - save_prototype_draft
  - check_prototype_completeness
  - generate_prototype_spec
  - generate_html_prototype
  - package_prototype

decisionRules:
  - "用户确认某一阶段内容 → save_prototype_draft 保存原型草稿"
  - "完成阶段四后 → check_prototype_completeness 自检"
  - "用户需要说明文档 → generate_prototype_spec 生成Markdown"
  - "用户需要可点击原型 → generate_html_prototype 生成HTML/CSS/JS"
  - "用户需要交付压缩包 → package_prototype 打包原型目录"

tools:
  - name: save_prototype_draft
    description: >
      保存当前阶段的原型说明草稿。在Codex中没有专用后端工具时，
      通过写入或更新工作区内Markdown文件完成。
    params:
      document_id:
        type: string
        required: true
      section:
        type: enum
        required: true
        enum: [overview, users, pages, interactions, roles, sample_data, appendix_b]
      content_markdown:
        type: string
        required: true

  - name: check_prototype_completeness
    description: >
      对照 references/prototype-spec.md 的完整性自检清单，人工检查原型范围、
      页面、流程、角色、样例数据和交付说明是否完整。
    params:
      document_id:
        type: string
        required: true

  - name: generate_prototype_spec
    description: >
      将已确认的阶段草稿整合为正式Markdown原型说明文档。
    params:
      document_id:
        type: string
        required: true
      title:
        type: string
        required: true

  - name: generate_html_prototype
    description: >
      基于原型说明生成可点击HTML/CSS/JS原型。优先复用
      assets/html-prototype-template，或按现有项目技术栈实现。
    params:
      document_id:
        type: string
        required: true
      output_path:
        type: string
        required: false

  - name: package_prototype
    description: >
      将HTML原型目录打包为可交付压缩包，并报告文件路径和预览方式。
    params:
      prototype_path:
        type: string
        required: true
